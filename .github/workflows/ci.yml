name: Code Quality

on: [push, pull_request]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.10

      - name: Install deps
        run: pip install black flake8

      - name: Run Black
        run: python -m black --check .

      - name: Run Flake8
        run: python -m flake8 .